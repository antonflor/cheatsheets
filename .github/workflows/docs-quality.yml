name: Documentation quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate maintained Markdown structure
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import sys

          files = [
              "README.md",
              "CONTRIBUTING.md",
              "STYLE_GUIDE.md",
              "visual-guides.md",
              "arista.md",
              "aws.md",
              "azure.md",
              "cisco.md",
              "docker.md",
              "git.md",
              "google-cloud.md",
              "iptables.md",
              "kubernetes.md",
              "leaf-spine.md",
              "linux-boot.md",
              "pulumi.md",
              "rest-api.md",
              "spanning-tree.md",
              "terraform.md",
          ]

          supported_mermaid = re.compile(
              r"^(flowchart|graph|sequenceDiagram|stateDiagram-v2|"
              r"classDiagram|erDiagram|journey|gitGraph|mindmap|timeline)\b"
          )

          errors = []
          for filename in files:
              path = Path(filename)
              if not path.is_file():
                  errors.append(f"{filename}: file is missing")
                  continue

              text = path.read_text(encoding="utf-8")
              if not text.strip():
                  errors.append(f"{filename}: file is empty")
                  continue

              first_content_line = next(
                  (line for line in text.splitlines() if line.strip()),
                  "",
              )
              if not first_content_line.startswith("# "):
                  errors.append(f"{filename}: first content line must be an H1")
              if "\x00" in text:
                  errors.append(f"{filename}: NUL byte found")

              for number, line in enumerate(text.splitlines(), start=1):
                  if re.search(r"\[[^\]]*\]\(\s*\)", line):
                      errors.append(f"{filename}:{number}: empty Markdown link")

              opening_count = text.count("```mermaid")
              mermaid_blocks = re.findall(
                  r"```mermaid\s*\n(.*?)```",
                  text,
                  flags=re.DOTALL,
              )
              if opening_count != len(mermaid_blocks):
                  errors.append(f"{filename}: unclosed Mermaid code fence")

              for index, block in enumerate(mermaid_blocks, start=1):
                  first_line = next(
                      (line.strip() for line in block.splitlines() if line.strip()),
                      "",
                  )
                  if not supported_mermaid.match(first_line):
                      errors.append(
                          f"{filename}: Mermaid block {index} has an unsupported "
                          f"or missing diagram declaration: {first_line!r}"
                      )

          if errors:
              print("\n".join(errors))
              sys.exit(1)

          print(f"Validated {len(files)} maintained Markdown files.")
          PY

  links:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check maintained documentation links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --verbose
            --no-progress
            README.md
            CONTRIBUTING.md
            STYLE_GUIDE.md
            visual-guides.md
            arista.md
            aws.md
            azure.md
            cisco.md
            docker.md
            git.md
            google-cloud.md
            iptables.md
            kubernetes.md
            leaf-spine.md
            linux-boot.md
            pulumi.md
            rest-api.md
            spanning-tree.md
            terraform.md
          fail: true