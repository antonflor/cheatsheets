name: Documentation quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Lint maintained Markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            README.md
            CONTRIBUTING.md
            STYLE_GUIDE.md
            arista.md
            azure.md
            cisco.md
            docker.md
            gcloud.md
            iptables.md
            kubernetes.md
            rest-api.md
            terraform.md

  links:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check maintained documentation links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --verbose
            --no-progress
            README.md
            CONTRIBUTING.md
            STYLE_GUIDE.md
            arista.md
            azure.md
            cisco.md
            docker.md
            gcloud.md
            iptables.md
            kubernetes.md
            rest-api.md
            terraform.md
          fail: true
